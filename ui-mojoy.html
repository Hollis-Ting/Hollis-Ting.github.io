<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>UI-MOJOY互动影游 | 杨婷的作品集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "微软雅黑", sans-serif;
      background: #f5f5f5;
    }
    /* 返回按钮 */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      z-index: 999;
    }
    /* 标题 */
    h1 {
      text-align: center;
      padding: 60px 20px 20px;
      color: #333;
    }
    /* 图片容器：单列居中！ */
    .images-container {
      max-width: 1200px; /* 最大宽度，电脑上不会太宽 */
      margin: 0 auto;
      padding: 0 20px;
    }
    /* 每张图片：居中，宽度自适应，高度自动！ */
    .images-container img {
      display: block;
      width: 100%;
      height: auto;
      margin: 20px auto;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      cursor: zoom-in; /* 鼠标放上去显示可以放大 */
    }
    /* 点击放大的弹窗 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .modal img {
      max-width: 95%;
      max-height: 95%;
    }
    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 40px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- 返回首页的按钮 -->
  <a href="index.html" class="back-btn">← 返回首页</a>

  <!-- 项目标题 -->
  <h1>UI-MOJOY互动影游</h1>

  <!-- 所有图片都放这里！ -->
  <div class="images-container">
   <!-- 第一张图片 -->
    <img src="ui-qihuan/1.png" alt="第1页">
    <!-- 第二张图片 -->
    <img src="ui-qihuan/2.png" alt="第2页">
    <!-- 第三张图片 -->
    <img src="ui-qihuan/3.png" alt="第3页">
    <!-- 第四张图片 -->
    <img src="ui-qihuan/4.png" alt="第4页">
    <!-- 第五张图片 -->
    <img src="ui-qihuan/5.png" alt="第5页">
    <!-- 第六张图片 -->
    <img src="ui-qihuan/6.png" alt="第6页">
    <!-- 第七张图片 -->
    <img src="ui-qihuan/7.png" alt="第7页">
    <!-- 第八张图片 -->
    <img src="ui-qihuan/8.png" alt="第8页">
    <!-- 第九张图片 -->
    <img src="ui-qihuan/9.png" alt="第9页">
    <!-- 第十张图片 -->
    <img src="ui-qihuan/10.png" alt="第10页">
    <!-- 第十一张图片 -->
    <img src="ui-qihuan/11.png" alt="第11页">
  </div>

  <!-- 点击放大的弹窗 -->
  <div class="modal" id="imgModal">
    <span class="close" id="closeModal">&times;</span>
    <img id="modalImg" src="">
  </div>

  <script>
    // 点击图片放大的功能，和站酷一样！
    const modal = document.getElementById('imgModal');
    const modalImg = document.getElementById('modalImg');
    const closeBtn = document.getElementById('closeModal');

    // 给所有图片加点击事件
    const images = document.querySelectorAll('.images-container img');
    images.forEach(img => {
      img.onclick = function() {
        modal.style.display = 'flex';
        modalImg.src = this.src;
      }
    });

    // 关闭弹窗
    closeBtn.onclick = function() {
      modal.style.display = 'none';
    }
    modal.onclick = function(e) {
      if (e.target === modal) modal.style.display = 'none';
    }
  </script>
</body>
</html>
