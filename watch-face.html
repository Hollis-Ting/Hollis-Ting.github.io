<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>WATCH-FACE | 杨婷的作品集</title>
  <style>
    body {
      font-family: "微软雅黑", sans-serif;
      background: #f8f9fa;
    }
    .back-btn {
      display: inline-block;
      margin: 20px;
      padding: 8px 16px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
    h1 {
      text-align: center;
      margin: 20px 0;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .image-grid img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← 返回首页</a>
  <h1>watch-face</h1>

  <div class="image-grid">
    <!-- 这里放你所有图片 -->
    <img src="book-pack/1.png" alt="图1">
    <img src="book-pack/2.png" alt="图2">
    <img src="book-pack/3.png" alt="图3">
  </div>
</body>
</html>
